<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>银行智能网点导航系统</title>
  <script type="text/javascript">
    var path = window.location.pathname.replace('/navi-frontend', '');
    if (path === '/' || path === '') {
      window.location.replace('/navi-frontend/');
    } else {
      sessionStorage.setItem('spa_path', path);
      window.location.replace('/navi-frontend/');
    }
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
